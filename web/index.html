<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>layout-rs — sheet preview (WASM)</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 id="i18n-h1">Print sheet layout</h1>
        <p id="i18n-tagline" class="tagline">
          Proportional counts per sheet, multi-stage guillotine (V–H / H–V). Optional 90° rotation per piece.
        </p>
        <p id="i18n-engine" class="engine-note">Engine: Rust → WebAssembly (<code>solveLayoutJson</code>).</p>
        <p class="lang-row">
          <span id="i18n-langLabel" class="lang-label"></span>
          <button type="button" id="langEn" class="btn secondary btn-lang">English</button>
          <button type="button" id="langUa" class="btn secondary btn-lang">Українська</button>
        </p>
      </header>

      <div class="layout">
        <aside class="panel">
          <section class="card">
            <h2 id="i18n-sheetH2">Sheet</h2>
            <div class="grid2">
              <label>
                <span id="i18n-lblSheetW">Width Wp</span>
                <input type="number" id="sheetW" min="1" value="700" />
              </label>
              <label>
                <span id="i18n-lblSheetH">Height Hp</span>
                <input type="number" id="sheetH" min="1" value="600" />
              </label>
            </div>
            <label class="kmax">
              <span id="i18n-lblKmax">Max k (optional)</span>
              <input
                type="number"
                id="kMax"
                min="1"
                placeholder="default"
                title="Largest scale k tried when building proportional per-sheet piece counts. Empty uses default (500); also capped from sheet area (overall max 2000). Lower runs faster; higher searches more mixes."
                aria-describedby="kMaxHint"
              />
              <span id="kMaxHint" class="field-hint">
                The solver scales your targets’ proportion pattern by an integer
                <strong>k</strong> to get candidate piece counts per sheet. This
                field is the largest <strong>k</strong> it will try. Leave empty
                for the default (500). Smaller values finish faster but may miss
                a better layout; values are also limited by sheet size (up to
                2000).
              </span>
            </label>
            <label class="checkbox-row">
              <input type="checkbox" id="allowRotation" checked />
              <span id="i18n-lblRotationSheet"
                >Default: allow 90° rotation (for products set to “Sheet default”)</span
              >
            </label>
          </section>

          <section class="card">
            <div class="card-head">
              <h2 id="i18n-productsH2">Products</h2>
              <button type="button" id="addProduct" class="btn secondary">+ Add</button>
            </div>
            <div id="productList" class="product-list"></div>
          </section>

          <button type="button" id="compute" class="btn primary">Compute layout</button>
          <p id="error" class="error" hidden></p>
        </aside>

        <main class="preview">
          <section class="card stats-card" id="statsSection" hidden>
            <h2 id="i18n-resultH2">Result</h2>
            <dl class="stats" id="stats"></dl>
          </section>
          <section class="card svg-card">
            <h2 id="i18n-previewH2">One sheet preview</h2>
            <div id="svgHost" class="svg-host">
              <p class="placeholder" id="placeholder">
                Set sheet size and products, then click <strong>Compute layout</strong>.
              </p>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
